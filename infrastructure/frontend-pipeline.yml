AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  First-phase infrastructure: a private S3-hosted frontend served by CloudFront
  and a GitHub-to-CodeBuild deployment pipeline.

Parameters:
  ProjectName:
    Type: String
    Default: chess-move-validator
    AllowedPattern: "^[a-z][a-z0-9-]{2,40}$"
    Description: Lowercase name used to identify resources.
  GitHubConnectionArn:
    Type: String
    Description: ARN of an authorized CodeStar Connection to GitHub.
  GitHubRepository:
    Type: String
    Description: GitHub repository in owner/repository form.
  GitHubBranch:
    Type: String
    Default: main
    Description: Branch that deploys the frontend.
  ConfirmationEmailFrom:
    Type: String
    Description: Verified Amazon SES email address used to send upload-confirmation emails.
  ConfirmationLinkExpiryHours:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 168
    Description: Number of hours an upload confirmation link remains valid.
  ApiDeploymentVersion:
    Type: String
    Default: manual
    Description: Bump/hash this to force a new API Gateway deployment.

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  UploadBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
            AllowedOrigins:
              - "*"
            MaxAge: 300
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      VersioningConfiguration:
        Status: Enabled

  SubmissionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: submissionId
          AttributeType: S
      KeySchema:
        - AttributeName: submissionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      SSESpecification:
        SSEEnabled: true

  UploadFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CreateUploadSubmissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-upload-url*"
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub "${UploadBucket.Arn}/uploads/*"
              - Effect: Allow
                Action: dynamodb:PutItem
                Resource: !GetAtt SubmissionsTable.Arn

  UploadFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-upload-url"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt UploadFunctionRole.Arn
      Timeout: 10
      Environment:
        Variables:
          UPLOAD_BUCKET: !Ref UploadBucket
          SUBMISSIONS_TABLE: !Ref SubmissionsTable
          COMPLETE_URL: !Sub "https://${UploadApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/prod/upload-complete"
      Code:
        ZipFile: |
          import boto3
          import json
          import os
          import re
          import time
          import uuid
          from botocore.config import Config

          # A global S3 endpoint redirects this eu-central-1 bucket to its
          # regional endpoint. Browsers cannot safely follow that redirect for
          # a CORS preflighted presigned PUT, so sign the regional URL directly.
          region = os.environ['AWS_REGION']
          s3 = boto3.client(
              's3',
              region_name=region,
              endpoint_url='https://s3.{}.amazonaws.com'.format(region),
              config=Config(signature_version='s3v4', s3={'addressing_style': 'virtual'})
          )
          EMAIL = re.compile(r'^[^@\s]+@[^@\s]+\.[^@\s]+$')
          CONTENT_TYPE = re.compile(r'^[^\s/;]+/[^\s;]+$')
          MAX_SIZE = 10 * 1024 * 1024
          db = boto3.resource('dynamodb').Table(os.environ['SUBMISSIONS_TABLE'])

          def response(status, body):
              return {'statusCode': status, 'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}, 'body': json.dumps(body)}

          def handler(event, context):
              try:
                  body = json.loads(event.get('body') or '{}')
                  email = body.get('email', '').strip().lower()
                  filename = os.path.basename(body.get('fileName', ''))
                  content_type = body.get('contentType') or 'application/octet-stream'
                  size = body.get('size', 0)
                  if not EMAIL.match(email) or not filename or not CONTENT_TYPE.match(content_type) or not isinstance(size, int) or size < 1 or size > MAX_SIZE:
                      return response(400, {'message': 'Provide a valid email and a file up to 10 MB.'})
                  extension = os.path.splitext(filename)[1][:16]
                  submission_id = str(uuid.uuid4())
                  key = 'uploads/{}{}' .format(submission_id, extension)
                  db.put_item(Item={
                      'submissionId': submission_id, 'email': email, 'objectKey': key,
                      'status': 'UPLOADING', 'createdAt': int(time.time()),
                      'expiresAt': int(time.time()) + 3600
                  })
                  url = s3.generate_presigned_url('put_object', Params={
                      'Bucket': os.environ['UPLOAD_BUCKET'], 'Key': key,
                      'ContentType': content_type, 'Metadata': {'submission-id': submission_id}
                  }, ExpiresIn=300)
                  return response(200, {
                      'submissionId': submission_id, 'uploadUrl': url,
                      'contentType': content_type, 'completeUrl': os.environ['COMPLETE_URL']
                  })
              except (ValueError, TypeError):
                  return response(400, {'message': 'Invalid upload request.'})
              except Exception:
                  return response(500, {'message': 'Could not prepare the upload.'})

  UploadApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-upload-api"

  UploadCompleteFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SendUploadConfirmations
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-upload-complete*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt SubmissionsTable.Arn
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "${UploadBucket.Arn}/uploads/*"
              - Effect: Allow
                Action: ses:SendEmail
                Resource: "*"

  UploadCompleteFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-upload-complete"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt UploadCompleteFunctionRole.Arn
      Timeout: 10
      Environment:
        Variables:
          SUBMISSIONS_TABLE: !Ref SubmissionsTable
          UPLOAD_BUCKET: !Ref UploadBucket
          EMAIL_FROM: !Ref ConfirmationEmailFrom
          CONFIRM_URL: !Sub "https://${UploadApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/prod/confirm"
          CONFIRMATION_LINK_EXPIRY_HOURS: !Ref ConfirmationLinkExpiryHours
      Code:
        ZipFile: |
          import base64
          import boto3
          import hashlib
          import json
          import os
          import secrets
          import time
          from botocore.exceptions import ClientError

          table = boto3.resource('dynamodb').Table(os.environ['SUBMISSIONS_TABLE'])
          ses = boto3.client('ses')
          s3 = boto3.client('s3')

          def response(status, body):
              return {'statusCode': status, 'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}, 'body': json.dumps(body)}

          def handler(event, context):
              try:
                  body = json.loads(event.get('body') or '{}')
                  submission_id = body.get('submissionId', '')
                  if not submission_id:
                      return response(400, {'message': 'A submission ID is required.'})
                  item = table.get_item(Key={'submissionId': submission_id}).get('Item')
                  if not item or item.get('status') != 'UPLOADING':
                      return response(200, {'status': item.get('status', 'ERROR') if item else 'ERROR'})
                  try:
                      s3.head_object(Bucket=os.environ['UPLOAD_BUCKET'], Key=item['objectKey'])
                  except ClientError:
                      return response(400, {'message': 'The uploaded file could not be verified.'})
                  token = secrets.token_urlsafe(32)
                  token_hash = hashlib.sha256(token.encode()).hexdigest()
                  expiry_seconds = int(os.environ['CONFIRMATION_LINK_EXPIRY_HOURS']) * 3600
                  expires_at = int(time.time()) + expiry_seconds
                  try:
                      update = table.update_item(
                          Key={'submissionId': submission_id},
                          UpdateExpression='SET #status = :awaiting, confirmationTokenHash = :token, expiresAt = :expires',
                          ConditionExpression='#status = :uploading',
                          ReturnValues='ALL_NEW',
                          ExpressionAttributeNames={'#status': 'status'},
                          ExpressionAttributeValues={
                              ':awaiting': 'AWAITING_CONFIRMATION', ':uploading': 'UPLOADING',
                              ':token': token_hash, ':expires': expires_at
                          })
                  except ClientError as error:
                      if error.response['Error']['Code'] == 'ConditionalCheckFailedException':
                          return response(200, {'status': 'AWAITING_CONFIRMATION'})
                      raise
                  link = '{}?submissionId={}&token={}'.format(os.environ['CONFIRM_URL'], submission_id, token)
                  ses.send_email(
                      Source=os.environ['EMAIL_FROM'], Destination={'ToAddresses': [update['Attributes']['email']]},
                      Message={'Subject': {'Data': 'Confirm your Chess Move Validator upload'},
                               'Body': {'Text': {'Data': 'Confirm this specific upload by opening this one-time link: {}\n\nThis link expires in {} hours.'.format(link, expiry_seconds // 3600)}}})
                  return response(200, {'status': 'AWAITING_CONFIRMATION'})
              except (ValueError, TypeError):
                  return response(400, {'message': 'Invalid upload completion request.'})
              except Exception:
                  return response(500, {'message': 'Could not send the confirmation email.'})

  EvaluatorFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EvaluateMoveFile
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-evaluate-moves*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt SubmissionsTable.Arn
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "${UploadBucket.Arn}/uploads/*"
              - Effect: Allow
                Action: ses:SendEmail
                Resource: "*"

  EvaluatorFunction:
    Type: AWS::Lambda::Function
    Metadata:
      # Code is a local path resolved by `aws cloudformation package` at deploy
      # time; W3002 flags exactly that intentional requirement.
      cfn-lint:
        config:
          ignore_checks:
            - W3002
    Properties:
      FunctionName: !Sub "${ProjectName}-evaluate-moves"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt EvaluatorFunctionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          SUBMISSIONS_TABLE: !Ref SubmissionsTable
          UPLOAD_BUCKET: !Ref UploadBucket
          EMAIL_FROM: !Ref ConfirmationEmailFrom
      Code: ../functions/evaluate_moves

  ConfirmFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ConfirmSpecificUpload
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-confirm-upload*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt SubmissionsTable.Arn
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "${UploadBucket.Arn}/uploads/*"
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt EvaluatorFunction.Arn

  ConfirmFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-confirm-upload"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ConfirmFunctionRole.Arn
      Timeout: 10
      Environment:
        Variables:
          SUBMISSIONS_TABLE: !Ref SubmissionsTable
          UPLOAD_BUCKET: !Ref UploadBucket
          EVALUATOR_FUNCTION: !Ref EvaluatorFunction
      Code:
        ZipFile: |
          import boto3
          import hashlib
          import html
          import json
          import os
          import time
          from botocore.exceptions import ClientError

          table = boto3.resource('dynamodb').Table(os.environ['SUBMISSIONS_TABLE'])
          s3 = boto3.client('s3')
          lambda_client = boto3.client('lambda')

          def start_evaluation(submission_id):
              # Best-effort async hand-off to the move evaluator. The upload is
              # already confirmed; a failed invoke must not fail the page.
              try:
                  lambda_client.invoke(
                      FunctionName=os.environ['EVALUATOR_FUNCTION'],
                      InvocationType='Event',
                      Payload=json.dumps({'submissionId': submission_id}).encode())
              except Exception:
                  pass

          def page(title, message, status=200):
              return {'statusCode': status, 'headers': {'Content-Type': 'text/html; charset=utf-8'}, 'body': '<!doctype html><title>{}</title><h1>{}</h1><p>{}</p>'.format(html.escape(title), html.escape(title), html.escape(message))}

          def handler(event, context):
              params = event.get('queryStringParameters') or {}
              submission_id, token = params.get('submissionId', ''), params.get('token', '')
              if not submission_id or not token:
                  return page('Invalid confirmation link', 'This confirmation link is incomplete.', 400)
              item = table.get_item(Key={'submissionId': submission_id}).get('Item')
              token_hash = hashlib.sha256(token.encode()).hexdigest()
              if not item or item.get('confirmationTokenHash') != token_hash:
                  return page('Invalid confirmation link', 'This link does not match an upload.', 400)
              if item.get('status') == 'CONFIRMED':
                  return page('Upload already confirmed', 'This upload was already confirmed. No other upload was changed.')
              if item.get('status') != 'AWAITING_CONFIRMATION' or item.get('expiresAt', 0) < int(time.time()):
                  return page('Confirmation link unavailable', 'This link has expired or is no longer active.', 400)
              try:
                  s3.head_object(Bucket=os.environ['UPLOAD_BUCKET'], Key=item['objectKey'])
                  table.update_item(
                      Key={'submissionId': submission_id},
                      UpdateExpression='SET #status = :confirmed, confirmedAt = :now REMOVE expiresAt',
                      ConditionExpression='#status = :awaiting AND confirmationTokenHash = :token',
                      ExpressionAttributeNames={'#status': 'status'},
                      ExpressionAttributeValues={':confirmed': 'CONFIRMED', ':awaiting': 'AWAITING_CONFIRMATION', ':token': token_hash, ':now': int(time.time())})
                  start_evaluation(submission_id)
                  return page('Upload confirmed', 'Your specific upload has been confirmed. We are validating your chess moves and will email you the result shortly.')
              except ClientError as error:
                  if error.response['Error']['Code'] == 'ConditionalCheckFailedException':
                      return page('Upload already confirmed', 'This upload was already confirmed. No other upload was changed.')
                  return page('Upload unavailable', 'The uploaded file could not be verified.', 400)
              except Exception:
                  return page('Confirmation unavailable', 'Please try the link again later.', 500)

  UploadApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref UploadApi
      ParentId: !GetAtt UploadApi.RootResourceId
      PathPart: upload-url

  UploadCompleteApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref UploadApi
      ParentId: !GetAtt UploadApi.RootResourceId
      PathPart: upload-complete

  ConfirmApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref UploadApi
      ParentId: !GetAtt UploadApi.RootResourceId
      PathPart: confirm

  UploadApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref UploadApi
      ResourceId: !Ref UploadApiResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UploadFunction.Arn}/invocations"

  UploadApiOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref UploadApi
      ResourceId: !Ref UploadApiResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,POST'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  UploadCompleteApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref UploadApi
      ResourceId: !Ref UploadCompleteApiResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UploadCompleteFunction.Arn}/invocations"

  UploadCompleteApiOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref UploadApi
      ResourceId: !Ref UploadCompleteApiResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,POST'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ConfirmApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref UploadApi
      ResourceId: !Ref ConfirmApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConfirmFunction.Arn}/invocations"

  UploadApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref UploadFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${UploadApi}/*/POST/upload-url"

  UploadCompleteApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref UploadCompleteFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${UploadApi}/*/POST/upload-complete"

  ConfirmApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ConfirmFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${UploadApi}/*/GET/confirm"

  UploadApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - UploadApiMethod
      - UploadApiOptionsMethod
      - UploadCompleteApiMethod
      - UploadCompleteApiOptionsMethod
      - ConfirmApiMethod
    Properties:
      RestApiId: !Ref UploadApi
      Description: !Sub "Deployment ${ApiDeploymentVersion}"

  UploadApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref UploadApi
      DeploymentId: !Ref UploadApiDeployment
      StageName: prod

  FrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-frontend-oac"
        Description: CloudFront access to the private frontend bucket.
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt FrontendOriginAccessControl.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DeployFrontend
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-frontend-deploy*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !GetAtt FrontendBucket.Arn
                  - !GetAtt ArtifactBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub "${FrontendBucket.Arn}/*"
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  FrontendDeployProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${ProjectName}-frontend-deploy"
      Description: Deploys the static frontend and invalidates CloudFront.
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        Type: LINUX_CONTAINER
        EnvironmentVariables:
          - Name: FRONTEND_BUCKET
            Type: PLAINTEXT
            Value: !Ref FrontendBucket
          - Name: CLOUDFRONT_DISTRIBUTION_ID
            Type: PLAINTEXT
            Value: !Ref FrontendDistribution
          - Name: UPLOAD_API_URL
            Type: PLAINTEXT
            Value: !Sub "https://${UploadApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/prod/upload-url"
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      TimeoutInMinutes: 10

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SourceAndDeploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - codeconnections:UseConnection
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt FrontendDeployProject.Arn
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt ArtifactBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource: !Sub "${ArtifactBucket.Arn}/*"

  FrontendPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "${ProjectName}-frontend"
      PipelineType: V2
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Triggers:
        - ProviderType: CodeStarSourceConnection
          GitConfiguration:
            SourceActionName: GitHub
            Push:
              - Branches:
                  Includes:
                    - !Ref GitHubBranch
      Stages:
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                BranchName: !Ref GitHubBranch
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Ref GitHubRepository
                DetectChanges: true
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: Frontend
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref FrontendDeployProject
              InputArtifacts:
                - Name: SourceOutput
              RunOrder: 1

Outputs:
  FrontendUrl:
    Description: Public CloudFront URL for the frontend.
    Value: !Sub "https://${FrontendDistribution.DomainName}"
  UploadApiId:
    Description: REST API ID of the upload API, used to force a stage redeployment.
    Value: !Ref UploadApi
  FrontendBucketName:
    Description: Private S3 bucket that holds the deployed frontend.
    Value: !Ref FrontendBucket
  UploadBucketName:
    Description: Private S3 bucket that holds user-uploaded files.
    Value: !Ref UploadBucket
  PipelineName:
    Description: Pipeline that deploys frontend changes from GitHub.
    Value: !Ref FrontendPipeline
